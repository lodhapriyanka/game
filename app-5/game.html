<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Pong - Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --theme-primary: #00F0FF;
            --theme-secondary: #FF007F;
            --theme-accent: #FFD700;
            --bg-dark: #0A0A0F;
            --text: #f3f7ff;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1A0F2E 100%);
            color: var(--text);
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
            transition: opacity 220ms ease, filter 260ms ease;
        }

        body {
            touch-action: none;
        }

        body.fade-out {
            opacity: 0;
            filter: blur(2px);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.9) 0%, rgba(26, 15, 46, 0.9) 100%);
            transition: filter 220ms ease;
        }

        /* HUD Overlay */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
            font-family: 'Manrope', sans-serif;
        }

        .hud-top {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 101;
            flex-wrap: wrap;
        }

        .score-panel, .stats-panel {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.12) 0%, rgba(138, 43, 226, 0.12) 100%);
            border: 1.5px solid rgba(0, 240, 255, 0.4);
            border-radius: 14px;
            padding: 12px 16px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .score-panel {
            min-width: 110px;
            text-align: center;
        }

        .stats-panel {
            min-width: auto;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .score-text {
            font-size: 42px;
            font-weight: 800;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #00F0FF 0%, #FF007F 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            transition: transform 140ms ease, text-shadow 140ms ease;
            line-height: 1;
        }

        .score-text.pulse {
            transform: scale(1.12);
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.65);
        }

        .score-label {
            font-size: 12px;
            color: rgba(243, 247, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-top: 6px;
            font-weight: 600;
        }

        .stats-grid {
            display: flex;
            flex-direction: row;
            gap: 0;
            align-items: stretch;
        }

        .stat-item {
            text-align: center;
            padding: 10px 14px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            background: transparent;
            flex: 1;
            min-width: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00F0FF 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            letter-spacing: -0.5px;
        }

        .stat-name {
            font-size: 11px;
            color: rgba(243, 247, 255, 0.65);
            text-transform: uppercase;
            margin-top: 6px;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .stat-track {
            margin-top: 8px;
            height: 6px;
            width: 100%;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            transition: width 140ms ease;
        }

        .stat-fill.combo {
            background: linear-gradient(90deg, #FFD700 0%, #FF9F1A 100%);
        }

        .stat-fill.speed {
            background: linear-gradient(90deg, #00F0FF 0%, #8A2BE2 100%);
        }

        .stat-fill.power {
            background: linear-gradient(90deg, #53FFA8 0%, #00F0FF 100%);
        }

        .combo-display {
            font-size: 15px;
            color: #FFD700;
            margin-top: 6px;
            min-height: 18px;
            transition: opacity 180ms ease;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .effect-label {
            margin-top: 8px;
            font-size: 11px;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.82);
            text-transform: uppercase;
            min-height: 14px;
            font-weight: 600;
        }

        .top-right-stack {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 102;
            pointer-events: none;
        }

        .speed-caption {
            font-size: 13px;
            letter-spacing: 1.3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 2px 12px rgba(255, 255, 255, 0.45);
            font-weight: 700;
        }

        #speedBar {
            position: relative;
            width: 280px;
            height: 14px;
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.35);
            border-radius: 999px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 240, 255, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.2);
        }

        #speedBarFill {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #FFD700 0%, #00F0FF 50%, #FF007F 100%);
            box-shadow: 0 0 16px rgba(0, 240, 255, 0.8), inset 0 1px 2px rgba(255, 255, 255, 0.3);
            transition: width 120ms linear;
        }

        /* Control Panel */
        .controls-panel {
            position: absolute;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 10px;
            z-index: 101;
            pointer-events: all;
        }

        .premium-footer {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
            pointer-events: none;
            text-align: center;
        }

        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15) 0%, rgba(0, 240, 255, 0.1) 100%);
            border: 1.5px solid rgba(255, 215, 0, 0.35);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(243, 247, 255, 0.9);
            animation: shimmer 3s ease-in-out infinite;
        }

        .diamond-icon {
            font-size: 18px;
            filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.6));
            animation: diamondGlow 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { 
                box-shadow: 0 4px 16px rgba(255, 215, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.15);
            }
            50% { 
                box-shadow: 0 6px 24px rgba(255, 215, 0, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.25);
            }
        }

        @keyframes diamondGlow {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.6));
            }
            50% { 
                transform: scale(1.1) rotate(360deg);
                filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.9));
            }
        }

        @keyframes comboBoost {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes scorePopup {
            0% {
                transform: scale(0.8) translateY(10px);
                opacity: 0;
            }
            50% {
                transform: scale(1.1) translateY(-5px);
                opacity: 1;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 8px 32px rgba(0, 240, 255, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow: 0 12px 40px rgba(0, 240, 255, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.2);
            }
        }

        .score-panel.boost {
            animation: glowPulse 0.4s ease-out;
        }

        .stat-number.boost {
            animation: comboBoost 0.4s ease-out;
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(0, 240, 255, 0.45);
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.12) 0%, rgba(138, 43, 226, 0.12) 100%);
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 240, 255, 0.15);
        }

        .control-btn.text-btn {
            width: auto;
            min-width: 100px;
            height: 48px;
            border-radius: 999px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 750;
            letter-spacing: 0.9px;
            text-transform: uppercase;
        }

        .control-btn:hover {
            border-color: rgba(0, 240, 255, 0.85);
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2) 0%, rgba(138, 43, 226, 0.2) 100%);
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }

        .control-btn.active {
            border-color: rgba(255, 0, 127, 0.95);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        /* Center Overlay */
        .center-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: all;
            z-index: 102;
        }

        .paused-label {
            font-size: 48px;
            font-weight: 800;
            color: var(--theme-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .paused-label.show {
            opacity: 1;
        }

        .start-overlay {
            position: fixed;
            inset: 0;
            z-index: 190;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(7, 8, 14, 0.92), rgba(21, 10, 35, 0.9));
            backdrop-filter: blur(6px);
            pointer-events: all;
            opacity: 1;
            transition: opacity 240ms ease;
        }

        .start-overlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        .start-card {
            width: min(92vw, 430px);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.08), rgba(255, 0, 127, 0.08));
            border: 1px solid rgba(0, 240, 255, 0.35);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45), 0 0 30px rgba(0, 240, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .start-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 38px;
            letter-spacing: 1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00F0FF 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-copy {
            font-size: 12px;
            line-height: 1.6;
            color: rgba(243, 247, 255, 0.8);
            margin-bottom: 16px;
        }

        .start-btn {
            border: 0;
            border-radius: 999px;
            padding: 14px 32px;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            font-weight: 750;
            letter-spacing: 1.1px;
            text-transform: uppercase;
            cursor: pointer;
            color: #070a10;
            background: linear-gradient(135deg, #00F0FF 0%, #FFD700 100%);
            box-shadow: 0 8px 24px rgba(0, 240, 255, 0.4);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 240, 255, 0.6);
        }

        .start-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .start-btn.secondary {
            color: #ecf8ff;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.08));
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: none;
        }

        body.focus-mode canvas {
            filter: saturate(0.75) brightness(0.85);
        }

        body.focus-mode .hud-top {
            opacity: 0;
            transform: translateY(-8px);
        }

        body.focus-mode .controls-panel {
            opacity: 0.35;
        }

        body.focus-mode .controls-panel #focusBtn {
            opacity: 1;
            border-color: rgba(255, 0, 127, 0.8);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.45);
        }

        /* Game Over Screen */
        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(10, 10, 15, 0.95) 0%, rgba(26, 15, 46, 0.95) 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .game-over-screen.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .game-over-title {
            font-size: 64px;
            font-weight: 800;
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #FF007F 0%, #00F0FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-over-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.12) 0%, rgba(138, 43, 226, 0.12) 100%);
            border: 1.5px solid rgba(0, 240, 255, 0.35);
            border-radius: 14px;
            padding: 24px 16px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 24px rgba(0, 240, 255, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .stat-box-value {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #00F0FF 0%, #FFD700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            line-height: 1;
        }

        .stat-box-label {
            font-size: 13px;
            color: rgba(243, 247, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .game-over-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .game-over-btn {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .btn-play {
            background: linear-gradient(135deg, #00F0FF 0%, #FF007F 100%);
            color: white;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.6);
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        @media (max-width: 768px) {
            .hud-top {
                flex-direction: column;
                top: 8px;
                left: 8px;
                right: 8px;
                gap: 10px;
            }

            .score-panel {
                padding: 10px 14px;
                min-width: auto;
            }

            .stats-panel {
                min-width: 100%;
                width: 100%;
            }

            .score-text {
                font-size: 36px;
            }

            .stats-grid {
                flex-direction: row;
                gap: 0;
            }

            .stat-item {
                padding: 8px 10px;
                min-width: 70px;
            }

            .stat-number {
                font-size: 20px;
            }

            .stat-name {
                font-size: 10px;
            }

            .top-right-stack {
                bottom: 68px;
                left: 50%;
            }

            .speed-caption {
                font-size: 11px;
            }

            #speedBar {
                width: 220px;
                height: 12px;
            }

            .controls-panel {
                bottom: 16px;
                right: 16px;
                gap: 8px;
            }

            .control-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }

            .control-btn.text-btn {
                min-width: 90px;
                height: 44px;
                font-size: 12px;
            }

            .premium-footer {
                bottom: 10px;
            }

            .premium-badge {
                padding: 6px 12px;
                font-size: 11px;
                gap: 6px;
            }

            .diamond-icon {
                font-size: 16px;
            }

            .game-over-stats {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 0 20px;
            }

            .game-over-title {
                font-size: 48px;
            }

            .stat-box {
                padding: 20px 16px;
            }

            .stat-box-value {
                font-size: 32px;
            }

            .stat-box-label {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <!-- Top HUD -->
        <div class="hud-top">
            <div class="score-panel">
                <div class="score-text" id="scoreText">0</div>
                <div class="score-label">Score</div>
            </div>
            <div class="stats-panel">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="comboText">1</div>
                        <div class="stat-name">Combo</div>
                        <div class="stat-track"><div class="stat-fill combo" id="comboBarFill"></div></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="speedText">1.0×</div>
                        <div class="stat-name">Speed</div>
                        <div class="stat-track"><div class="stat-fill speed" id="speedStatFill"></div></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="powerText">100</div>
                        <div class="stat-name">Power</div>
                        <div class="stat-track"><div class="stat-fill power" id="powerBarFill"></div></div>
                    </div>
                </div>
                <div class="combo-display" id="comboLabel"></div>
                <div class="effect-label" id="effectLabel"></div>
            </div>
            <div class="top-right-stack">
                <div id="speedBar"><div id="speedBarFill"></div></div>
                <div class="speed-caption">Velocity</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-panel">
            <button class="control-btn text-btn" id="pauseBtn" title="Pause (SPACE)">Pause</button>
            <button class="control-btn" id="soundBtn" title="Sound (S)">🔊</button>
            <button class="control-btn" id="boostBtn" title="Boost (B)">⚡</button>
            <button class="control-btn text-btn" id="restartBtn" title="Restart (R)">Restart</button>
            <button class="control-btn" id="focusBtn" title="Focus Mode (F)">🎯</button>
            <button class="control-btn" id="homeBtn" title="Home">🏠</button>
        </div>

        <!-- Pause Indicator -->
        <div class="center-overlay">
            <div class="paused-label" id="pausedLabel">PAUSED</div>
        </div>

        <!-- Premium Footer -->
        <div class="premium-footer">
            <div class="premium-badge">
                <span class="diamond-icon">💎</span>
                <span>Made with Premium Edition</span>
            </div>
        </div>
    </div>

    <div class="start-overlay" id="startOverlay">
        <div class="start-card">
            <div class="start-title">Emoji Pong</div>
            <div class="start-copy">Tap start to begin.<br>Game stays paused until you launch it.</div>
            <div class="start-actions">
                <button class="start-btn" id="startBtn">Start Game</button>
                <button class="start-btn secondary" id="guideBtn">How To Play</button>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-title" id="gameOverTitle">GAME OVER</div>
        <div class="game-over-stats">
            <div class="stat-box">
                <div class="stat-box-value" id="finalScore">0</div>
                <div class="stat-box-label">Final Score</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="finalCombo">1×</div>
                <div class="stat-box-label">Max Combo</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="highScoreDisplay">0</div>
                <div class="stat-box-label">High Score</div>
            </div>
        </div>
        <div class="game-over-buttons">
            <button class="game-over-btn btn-play" onclick="location.reload()">↻ PLAY AGAIN</button>
            <button class="game-over-btn btn-home" onclick="goHome()">🏠 HOME</button>
        </div>
    </div>

    <script>
        const COLOR_SYNC_KEY = 'emojiPongColorSync';

        function getColorSyncState() {
            try {
                const existing = JSON.parse(localStorage.getItem(COLOR_SYNC_KEY) || 'null');
                if (existing && Number.isFinite(existing.baseEpoch) && Number.isFinite(existing.phaseOffset)) {
                    return existing;
                }
            } catch (error) {
                // Fall through and create a fresh sync state.
            }

            const fresh = {
                baseEpoch: Date.now(),
                phaseOffset: 0
            };
            localStorage.setItem(COLOR_SYNC_KEY, JSON.stringify(fresh));
            return fresh;
        }

        const colorSync = getColorSyncState();

        function getSyncedColorMs() {
            return (Date.now() - colorSync.baseEpoch) + colorSync.phaseOffset * 1000;
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // UI Elements
        const ui = {
            scoreText: document.getElementById('scoreText'),
            comboText: document.getElementById('comboText'),
            speedText: document.getElementById('speedText'),
            powerText: document.getElementById('powerText'),
            comboBarFill: document.getElementById('comboBarFill'),
            speedStatFill: document.getElementById('speedStatFill'),
            powerBarFill: document.getElementById('powerBarFill'),
            speedBar: document.getElementById('speedBar'),
            speedBarFill: document.getElementById('speedBarFill'),
            startOverlay: document.getElementById('startOverlay'),
            startBtn: document.getElementById('startBtn'),
            guideBtn: document.getElementById('guideBtn'),
            effectLabel: document.getElementById('effectLabel'),
            pauseBtn: document.getElementById('pauseBtn'),
            soundBtn: document.getElementById('soundBtn'),
            boostBtn: document.getElementById('boostBtn'),
            restartBtn: document.getElementById('restartBtn'),
            focusBtn: document.getElementById('focusBtn'),
            homeBtn: document.getElementById('homeBtn'),
            pausedLabel: document.getElementById('pausedLabel'),
            gameOverScreen: document.getElementById('gameOverScreen'),
            gameOverTitle: document.getElementById('gameOverTitle'),
            finalScore: document.getElementById('finalScore'),
            finalCombo: document.getElementById('finalCombo'),
            highScoreDisplay: document.getElementById('highScoreDisplay'),
            comboLabel: document.getElementById('comboLabel')
        };

        // Game State
        const state = {
            score: 0,
            combo: 1,
            maxCombo: 1,
            hitStreak: 0,
            displayScore: 0,
            highScore: localStorage.getItem('emojiPongHighScore') || 0,
            speedFactor: 1,
            started: false,
            paused: true,
            gameOver: false,
            focusMode: false,
            comboMultiplier: 1,
            comboMultiplierUntil: 0,
            screenShake: 0,
            power: 100,
            soundEnabled: localStorage.getItem('emojiPongSound') !== 'false',
            ballCount: 1,
            theme: 0,
            gravityShiftUntil: 0,
            gravityX: 0,
            nextGravityShiftAt: performance.now() + 8000,
            effectText: '',
            effectTextUntil: 0,
            particles: [],
            bgDrift: 0,
            bgOrbs: Array.from({ length: 14 }, () => ({
                x: Math.random(),
                y: Math.random(),
                r: 0.002 + Math.random() * 0.006,
                v: 0.0003 + Math.random() * 0.0008
            }))
        };

        const audioEngine = {
            context: null,
            master: null,
            ambientGain: null,
            ambientFilter: null,
            ambientA: null,
            ambientB: null
        };

        // Theme System
        const themes = [
            { name: 'NEON BLUE', primary: '#00F0FF', secondary: '#8A2BE2', accent: '#FF007F' },
            { name: 'ROYAL GOLD', primary: '#FFD700', secondary: '#FF007F', accent: '#00F0FF' },
            { name: 'CYBER PINK', primary: '#FF007F', secondary: '#00F0FF', accent: '#FFD700' },
            { name: 'ICE LUXE', primary: '#00F0FF', secondary: '#FFD700', accent: '#8A2BE2' }
        ];

        // Paddle
        const paddle = {
            x: canvas.width / 2 - 60,
            y: canvas.height - 50,
            width: 120,
            height: 15,
            speed: 10
        };

        // Balls
        let balls = [{
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: 5,
            dy: -5,
            radius: 15,
            trail: [],
                        maxTrail: 10
        }];

        // Input
        const keys = new Set();
        let mouseX = canvas.width / 2;
        let touchX = null;

        // Audio Context
        let audioContext = null;

        function initAudio() {
            if (audioEngine.context) {
                audioContext = audioEngine.context;
                return;
            }
            audioContext = new (window.AudioContext || window.webkitAudioContext)();

            const master = audioContext.createGain();
            master.gain.value = 0.34;
            master.connect(audioContext.destination);

            const ambientGain = audioContext.createGain();
            ambientGain.gain.value = 0.015;

            const ambientFilter = audioContext.createBiquadFilter();
            ambientFilter.type = 'lowpass';
            ambientFilter.frequency.value = 280;
            ambientFilter.Q.value = 0.9;

            const ambientA = audioContext.createOscillator();
            ambientA.type = 'sine';
            ambientA.frequency.value = 84;

            const ambientB = audioContext.createOscillator();
            ambientB.type = 'triangle';
            ambientB.frequency.value = 126;

            ambientA.connect(ambientFilter);
            ambientB.connect(ambientFilter);
            ambientFilter.connect(ambientGain);
            ambientGain.connect(master);

            ambientA.start();
            ambientB.start();

            audioEngine.context = audioContext;
            audioEngine.master = master;
            audioEngine.ambientGain = ambientGain;
            audioEngine.ambientFilter = ambientFilter;
            audioEngine.ambientA = ambientA;
            audioEngine.ambientB = ambientB;
        }

        function playSound(freq, duration = 0.1, type = 'sine') {
            if (!state.soundEnabled || !audioContext) return;

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioEngine.master || audioContext.destination);

            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        function updateAdaptiveMusic() {
            if (!audioEngine.context || !audioEngine.ambientGain || !audioEngine.ambientFilter) {
                return;
            }

            const t = audioEngine.context.currentTime;
            const speedIntensity = Math.min(1, Math.max(0, (state.speedFactor - 1) / 1.7));
            const comboIntensity = Math.min(1, state.combo / 26);
            const intensity = Math.min(1, speedIntensity * 0.68 + comboIntensity * 0.32);
            const pausedFactor = state.paused || state.gameOver ? 0.45 : 1;

            const targetGain = (0.015 + intensity * 0.085) * pausedFactor;
            const targetFilter = 250 + intensity * 1650;

            audioEngine.ambientGain.gain.setTargetAtTime(targetGain, t, 0.25);
            audioEngine.ambientFilter.frequency.setTargetAtTime(targetFilter, t, 0.25);
            audioEngine.ambientA.detune.setTargetAtTime(intensity * 60, t, 0.22);
            audioEngine.ambientB.detune.setTargetAtTime(intensity * 95, t, 0.22);
        }

        function pulseElement(element) {
            element.classList.remove('pulse');
            void element.offsetWidth;
            element.classList.add('pulse');
            setTimeout(() => element.classList.remove('pulse'), 180);
        }

        function setEffectText(text, ms = 1200) {
            state.effectText = text;
            state.effectTextUntil = performance.now() + ms;
        }

        function triggerGravityShift() {
            state.gravityX = (Math.random() > 0.5 ? 1 : -1) * (0.012 + Math.random() * 0.03);
            state.gravityShiftUntil = performance.now() + 1900;
            state.nextGravityShiftAt = performance.now() + 7000 + Math.random() * 4200;
            setEffectText('Gravity Shift', 1400);
            playSound(520, 0.14, 'sawtooth');
        }

        function spawnComboExplosion(x, y) {
            const amount = 34;
            for (let i = 0; i < amount; i++) {
                const angle = (Math.PI * 2 * i) / amount;
                const power = 1.2 + Math.random() * 4.8;
                state.particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * power,
                    vy: Math.sin(angle) * power,
                    life: 0,
                    maxLife: 32 + Math.random() * 16,
                    emoji: ['✨', '💥', '⚡'][i % 3],
                    size: 16 + Math.random() * 12
                });
            }
            state.comboMultiplier = 2;
            state.comboMultiplierUntil = performance.now() + 2200;
            setEffectText('Combo Explosion x2', 1600);
            state.screenShake = 9;
            playSound(980, 0.18, 'triangle');
        }

        function updateParticles() {
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.life += 1;
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.vy += 0.02;
                if (p.life >= p.maxLife) {
                    state.particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (let i = 0; i < state.particles.length; i++) {
                const p = state.particles[i];
                const alpha = 1 - p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.font = `${p.size}px Arial`;
                ctx.fillText(p.emoji, p.x, p.y);
            }
            ctx.globalAlpha = 1;
        }

        function drawBackground(frameTime) {
            const w = canvas.width;
            const h = canvas.height;
            const syncedMs = getSyncedColorMs();
            state.bgDrift += 0.0022;
            const shift = Math.sin(state.bgDrift + syncedMs * 0.00035) * 0.18;
            const hueA = (syncedMs * 0.012) % 360;
            const hueB = (hueA + 90) % 360;
            const hueC = (hueA + 190) % 360;
            const pulse = (Math.sin(syncedMs * 0.0012) + 1) * 0.5;

            ctx.save();
            if (state.focusMode) {
                ctx.filter = 'blur(7px)';
            }

            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, `hsla(${hueA}, 84%, 24%, ${0.9 + shift * 0.08})`);
            grad.addColorStop(0.5, `hsla(${hueB}, 80%, 28%, ${0.9 + pulse * 0.04})`);
            grad.addColorStop(1, `hsla(${hueC}, 82%, 26%, ${0.9 - shift * 0.06})`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            const lightBloom = ctx.createRadialGradient(
                w * (0.18 + pulse * 0.18),
                h * (0.25 + shift * 0.2),
                0,
                w * 0.45,
                h * 0.42,
                w * 0.55
            );
            lightBloom.addColorStop(0, `hsla(${(hueB + 30) % 360}, 95%, 80%, 0.16)`);
            lightBloom.addColorStop(1, 'hsla(0, 0%, 100%, 0)');
            ctx.fillStyle = lightBloom;
            ctx.fillRect(0, 0, w, h);

            for (let i = 0; i < state.bgOrbs.length; i++) {
                const orb = state.bgOrbs[i];
                orb.y += orb.v;
                if (orb.y > 1.05) {
                    orb.y = -0.05;
                    orb.x = Math.random();
                }
                const x = orb.x * w;
                const y = orb.y * h;
                const r = orb.r * Math.min(w, h) * 1.7;
                const orbHue = (hueA + i * 18 + syncedMs * 0.01) % 360;
                const glow = ctx.createRadialGradient(x, y, 0, x, y, r);
                glow.addColorStop(0, `hsla(${orbHue}, 100%, 76%, 0.3)`);
                glow.addColorStop(1, `hsla(${orbHue}, 100%, 76%, 0)`);
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // Event Listeners
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, mouseX - paddle.width / 2));
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches[0]) {
                touchX = e.touches[0].clientX;
                paddle.x = Math.max(0, Math.min(canvas.width - paddle.width, touchX - paddle.width / 2));
            }
        });

        document.addEventListener('keydown', (e) => {
            keys.add(e.key.toLowerCase());
            if (e.key === ' ') togglePause();
            if (e.key.toLowerCase() === 'r') restartGame();
            if (e.key.toLowerCase() === 'b') useBoost();
            if (e.key.toLowerCase() === 's') toggleSound();
            if (e.key.toLowerCase() === 'f') toggleFocusMode();
        });

        document.addEventListener('keyup', (e) => {
            keys.delete(e.key.toLowerCase());
        });

        ui.pauseBtn.addEventListener('click', togglePause);
        ui.soundBtn.addEventListener('click', toggleSound);
        ui.boostBtn.addEventListener('click', useBoost);
        ui.restartBtn.addEventListener('click', restartGame);
        ui.focusBtn.addEventListener('click', toggleFocusMode);
        ui.startBtn.addEventListener('click', startGameSession);
        ui.guideBtn.addEventListener('click', openGuidePage);
        ui.homeBtn.addEventListener('click', goHome);

        // Game Functions
        function togglePause() {
            if (!state.started || state.gameOver) return;
            initAudio();
            state.paused = !state.paused;
            ui.pausedLabel.classList.toggle('show', state.paused);
            playSound(state.paused ? 400 : 600, 0.1);
        }

        function startGameSession() {
            if (state.started) return;
            initAudio();
            if (audioEngine.context && audioEngine.context.state === 'suspended') {
                audioEngine.context.resume();
            }
            state.started = true;
            state.paused = false;
            ui.startOverlay.classList.add('hide');
            ui.pausedLabel.classList.remove('show');
            playSound(760, 0.08, 'triangle');
        }

        function openGuidePage() {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'how-to-play.html';
            }, 180);
        }

        function toggleFocusMode() {
            state.focusMode = !state.focusMode;
            document.body.classList.toggle('focus-mode', state.focusMode);
            ui.focusBtn.classList.toggle('active', state.focusMode);
            setEffectText(state.focusMode ? 'Focus Mode' : 'Focus Off', 900);
            playSound(state.focusMode ? 740 : 520, 0.08, 'triangle');
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            localStorage.setItem('emojiPongSound', state.soundEnabled);
            ui.soundBtn.textContent = state.soundEnabled ? '🔊' : '🔇';
            playSound(state.soundEnabled ? 800 : 300, 0.1);
        }

        function useBoost() {
            if (state.power < 100 || state.gameOver) return;
            state.power = 0;
            balls.forEach(ball => {
                ball.dx *= 1.5;
                ball.dy *= 1.5;
                state.speedFactor *= 1.2;
            });
            playSound(900, 0.2, 'square');
            state.screenShake = 8;
        }

        function triggerScoreSlowMo() {
            balls.forEach((activeBall) => {
                activeBall.dx *= 0.5;
                activeBall.dy *= 0.5;
            });

            setTimeout(() => {
                balls.forEach((activeBall) => {
                    activeBall.dx *= 2;
                    activeBall.dy *= 2;
                });
            }, 500);
        }

        function restartGame() {
            if (state.gameOver) {
                location.reload();
                return;
            }
            playSound(420, 0.08, 'triangle');
            document.body.classList.add('fade-out');
            setTimeout(() => location.reload(), 180);
        }

        function goHome() {
            playSound(360, 0.08, 'triangle');
            document.body.classList.add('fade-out');
            setTimeout(() => {
            window.location.href = 'index.html';
            }, 180);
        }

        // Draw Functions
        function drawPaddle() {
            const theme = themes[state.theme];
            
            // Paddle body
            ctx.fillStyle = theme.primary;
            ctx.shadowColor = theme.primary;
            ctx.shadowBlur = 20;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;

            // Paddle highlight
            ctx.fillStyle = theme.primary + '40';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, 2);
        }

        function drawBall(ball) {
            // Motion trail with fade effect
            if (!state.focusMode && ball.trail.length > 1) {
                for (let i = 0; i < ball.trail.length; i++) {
                    const point = ball.trail[i];
                    const alpha = i / ball.trail.length;
                    ctx.globalAlpha = alpha * 0.7;
                    ctx.font = `${18 + alpha * 12}px Arial`;
                    ctx.fillText('🔥', point.x, point.y);
                }
                ctx.globalAlpha = 1;
            }

            // Current ball with glow
            ctx.font = '32px Arial';
            ctx.globalAlpha = 1;
            ctx.shadowColor = themes[state.theme].primary;
            ctx.shadowBlur = 15;
            ctx.fillText('🔥', ball.x, ball.y);
            ctx.shadowBlur = 0;
        }

        function updateBall(ball) {
            // Add to trail
            ball.trail.push({ x: ball.x, y: ball.y });
            if (ball.trail.length > ball.maxTrail) {
                ball.trail.shift();
            }

            // Physics
            ball.x += ball.dx * state.speedFactor;
            ball.y += ball.dy * state.speedFactor;

            if (performance.now() < state.gravityShiftUntil) {
                ball.dx += state.gravityX;
                ball.dx = Math.max(-14, Math.min(14, ball.dx));
            }

            // Wall collisions
            if (ball.x < 0 || ball.x > canvas.width) {
                ball.dx *= -1;
                ball.x = Math.max(0, Math.min(canvas.width, ball.x));
                playSound(600, 0.08);
                state.screenShake = 3;
            }

            if (ball.y < 0) {
                ball.dy *= -1;
                ball.y = 0;
                playSound(600, 0.08);
                state.screenShake = 3;
            }

            // Game over
            if (ball.y > canvas.height) {
                endGame();
                return false;
            }

            // Paddle collision
            if (ball.y + 15 > paddle.y &&
                ball.y - 15 < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {

                ball.dy *= -1;
                ball.y = paddle.y - 15;

                // Angle based on hit position
                const hitPos = (ball.x - paddle.x) / paddle.width;
                ball.dx += (hitPos - 0.5) * 4;

                // Score and combo
                const gained = Math.max(1, Math.round(state.combo * state.comboMultiplier));
                state.score += gained;
                state.hitStreak += 1;
                state.combo++;
                state.maxCombo = Math.max(state.maxCombo, state.combo);
                state.speedFactor += 0.015;
                state.power = Math.min(100, state.power + 5);

                pulseElement(ui.scoreText);

                // Every 10 points, add a brief half-speed moment.
                if (state.score % 10 === 0) {
                    triggerScoreSlowMo();
                }

                if (state.hitStreak % 10 === 0) {
                    spawnComboExplosion(ball.x, ball.y);
                }

                // Paddle shrink
                paddle.width = Math.max(80, 120 - state.score / 50);

                // Theme switch every 150 points
                state.theme = Math.floor(state.score / 150) % themes.length;

                playSound(800 + state.combo * 20, 0.1);
                state.screenShake = 5;
            }

            return true;
        }

        function endGame() {
            state.gameOver = true;
            state.highScore = Math.max(state.highScore, state.score);
            localStorage.setItem('emojiPongHighScore', state.highScore);
            
            ui.finalScore.textContent = state.score;
            ui.finalCombo.textContent = `${state.maxCombo}×`;
            ui.highScoreDisplay.textContent = state.highScore;
            ui.gameOverScreen.classList.add('show');

            playSound(300, 0.5, 'sine');
        }

        // Update UI
        function updateUI() {
            state.displayScore += (state.score - state.displayScore) * 0.22;
            if (Math.abs(state.score - state.displayScore) < 0.4) {
                state.displayScore = state.score;
            }
            ui.scoreText.textContent = Math.round(state.displayScore);
            ui.comboText.textContent = `x${state.combo}`;
            ui.speedText.textContent = state.speedFactor.toFixed(1) + '×';
            ui.powerText.textContent = `${Math.round(state.power)}%`;

            const comboPct = Math.min(100, state.combo * 6);
            const speedPct = Math.min(100, Math.max(0, (state.speedFactor - 1) * 55));
            const powerPct = Math.min(100, Math.max(0, state.power));
            ui.comboBarFill.style.width = `${comboPct}%`;
            ui.speedStatFill.style.width = `${speedPct}%`;
            ui.powerBarFill.style.width = `${powerPct}%`;

            const leadBall = balls[0];
            const speedBarWidth = leadBall ? Math.min(Math.abs(leadBall.dx) * 20, 150) : 0;
            ui.speedBarFill.style.width = `${speedBarWidth}px`;
            
            if (state.combo > 1) {
                ui.comboLabel.textContent = `🔥 ${state.combo}× MULTIPLIER • x${state.comboMultiplier.toFixed(1)}`;
            } else {
                ui.comboLabel.textContent = '';
            }

            ui.effectLabel.textContent = performance.now() < state.effectTextUntil ? state.effectText : '';
        }

        // Animation Loop
        function gameLoop(frameTime = 0) {
            // Draw animated background layer.
            drawBackground(frameTime);

            if (state.started && !state.paused) {

                if (performance.now() >= state.nextGravityShiftAt) {
                    triggerGravityShift();
                }

                if (performance.now() >= state.comboMultiplierUntil) {
                    state.comboMultiplier = 1;
                }

                // Screen shake
                if (state.screenShake > 0) {
                    const shake = state.screenShake;
                    ctx.save();
                    ctx.translate(
                        (Math.random() - 0.5) * shake,
                        (Math.random() - 0.5) * shake
                    );
                    state.screenShake--;
                }

                // Update balls
                balls = balls.filter(ball => updateBall(ball));

                // Multi-ball trigger
                if (state.score >= 500 && balls.length === 1) {
                    const newBall = {
                        x: canvas.width / 4,
                        y: canvas.height / 3,
                        dx: -5,
                        dy: -5,
                        radius: 15,
                        trail: [],
                        maxTrail: 10
                    };
                    balls.push(newBall);
                    playSound(1200, 0.2);
                }

                // Draw everything
                drawPaddle();
                balls.forEach(drawBall);
                if (!state.focusMode) {
                    updateParticles();
                    drawParticles();
                }

                if (state.screenShake > 0) {
                    ctx.restore();
                }
            } else {
                drawPaddle();
                balls.forEach(drawBall);
            }

            updateAdaptiveMusic();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start render loop (game starts only after Start button tap)
        gameLoop();
    </script>
</body>
