<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Pong - Premium Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0A0A0F;
            --bg-darker: #050508;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.12);
            --text: #f3f7ff;
            --cyan: #00F0FF;
            --violet: #8A2BE2;
            --pink: #FF007F;
            --gold: #FFD700;
            --green: #53ffa8;
            --hue-a: 198;
            --hue-b: 268;
            --hue-c: 328;
        }

        html, body {
            width: 100%;
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(
                135deg,
                hsl(var(--hue-a) 68% 18%) 0%,
                hsl(var(--hue-b) 56% 24%) 50%,
                hsl(var(--hue-c) 62% 22%) 100%
            );
            color: var(--text);
            overflow-x: hidden;
            overflow-y: auto;
            transition: background 420ms linear, opacity 220ms ease, filter 220ms ease;
        }

        body.fade-out {
            opacity: 0;
            filter: blur(2px);
        }

        html {
            scroll-behavior: smooth;
        }

        /* Animated Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-glow-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, hsl(var(--hue-a) 100% 78% / 0.24) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: 10%;
            animation: float 15s infinite ease-in-out;
        }

        .bg-glow-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, hsl(var(--hue-b) 92% 76% / 0.2) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -50px;
            right: 15%;
            animation: float 12s infinite ease-in-out 2s;
        }

        .bg-glow-3 {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, hsl(var(--hue-c) 94% 78% / 0.18) 0%, transparent 70%);
            border-radius: 50%;
            bottom: 20%;
            left: 5%;
            animation: float 18s infinite ease-in-out 1s;
        }

        .bg-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 18% 25%, hsl(var(--hue-b) 100% 84% / 0.14), transparent 35%),
                radial-gradient(circle at 80% 30%, hsl(var(--hue-a) 100% 86% / 0.12), transparent 32%),
                radial-gradient(circle at 60% 85%, hsl(var(--hue-c) 100% 86% / 0.1), transparent 38%);
            animation: liveAura 9s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes liveAura {
            0% { transform: translate3d(-2%, 0, 0) scale(1); }
            100% { transform: translate3d(2%, -1%, 0) scale(1.06); }
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(30px, -30px); }
            66% { transform: translate(-20px, 20px); }
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 60px;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(48px, 10vw, 120px);
            font-weight: 800;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--pink) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.2));
        }

        .tagline {
            font-size: clamp(16px, 3vw, 24px);
            color: rgba(243, 247, 255, 0.7);
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            color: #dffeff;
            opacity: 1;
            margin-top: 18px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .feature-badge {
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(255, 0, 127, 0.14));
            border: 1.5px solid rgba(0, 240, 255, 0.55);
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            color: #f6fdff;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.55);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2), inset 0 0 12px rgba(255, 255, 255, 0.08);
        }

        /* Button Styles */
        .button-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideUp 0.8s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            padding: 16px 48px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cyan) 0%, var(--pink) 100%);
            color: white;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 240, 255, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.15);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--glass);
            color: var(--cyan);
            border: 2px solid var(--cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .btn-secondary:hover {
            background: var(--glass-hover);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Stats Display */
        .stats {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-top: 40px;
            animation: slideUp 0.8s ease-out 0.4s both;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.12) 0%, rgba(138, 43, 226, 0.12) 100%);
            border: 1.5px solid rgba(0, 240, 255, 0.4);
            border-radius: 14px;
            padding: 28px 32px;
            text-align: center;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            flex: 1;
            min-width: 140px;
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .stat-card:hover {
            border-color: rgba(0, 240, 255, 0.6);
            box-shadow: 0 12px 40px rgba(0, 240, 255, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.15);
            transform: translateY(-6px);
        }

        .stat-value {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            line-height: 1;
            letter-spacing: -1px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(243, 247, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            color: rgba(243, 247, 255, 0.6);
            z-index: 10;
            text-align: center;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 240, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #00F0FF 0%, #FF007F 100%);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00F0FF 0%, #FF007F 100%);
            opacity: 0.8;
        }

        /* Emoji Background */
        #emoji-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .emoji {
            position: absolute;
            font-size: 24px;
            opacity: 0.6;
            animation: emojiFloat linear infinite;
        }

        @keyframes emojiFloat {
            0% {
                transform: translateY(100vh) scale(0.8);
                opacity: 0;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 48px;
            }

            .button-group {
                gap: 15px;
            }

            .btn {
                padding: 14px 32px;
                font-size: 16px;
            }

            .stats {
                flex-wrap: wrap;
                gap: 16px;
                max-width: 100%;
            }

            .stat-card {
                padding: 20px 24px;
                flex: 1;
                min-width: 120px;
            }

            .stat-value {
                font-size: 32px;
            }

            .stat-label {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-container">
        <div class="bg-glow-1"></div>
        <div class="bg-glow-2"></div>
        <div class="bg-glow-3"></div>
    </div>

    <!-- Floating Emoji Background -->
    <div id="emoji-bg"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>💎 EMOJI PONG</h1>
            <div class="tagline">Next-Gen Paddle Gaming</div>
            <div class="subtitle">
                <span class="feature-badge">⚡ Smooth Physics</span>
                <span class="feature-badge">🎨 Dynamic Themes</span>
                <span class="feature-badge">🔥 Real-time Combos</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button class="btn btn-primary" onclick="startGame()">
                ▶ PLAY GAME
            </button>
            <button class="btn btn-secondary" onclick="showInstruction()">
                ❓ HOW TO PLAY
            </button>
        </div>

        <!-- Stats -->
        <div class="stats" id="stats"></div>
    </div>

    <!-- Footer -->
    <div class="footer">Premium Edition • Made with 💎</div>

    <script>
        const COLOR_SYNC_KEY = 'emojiPongColorSync';

        function getColorSyncState() {
            try {
                const existing = JSON.parse(localStorage.getItem(COLOR_SYNC_KEY) || 'null');
                if (existing && Number.isFinite(existing.baseEpoch) && Number.isFinite(existing.phaseOffset)) {
                    return existing;
                }
            } catch (error) {
                // Fall through and create a fresh sync state.
            }

            const fresh = {
                baseEpoch: Date.now(),
                phaseOffset: 0
            };
            localStorage.setItem(COLOR_SYNC_KEY, JSON.stringify(fresh));
            return fresh;
        }

        const colorSync = getColorSyncState();

        function getSyncedColorMs() {
            return (Date.now() - colorSync.baseEpoch) + colorSync.phaseOffset * 1000;
        }

        // Global live color cycle for the home page.
        function animateHomeColors() {
            const t = getSyncedColorMs() * 0.001;
            const hueA = (200 + t * 18) % 360;
            const hueB = (hueA + 74 + Math.sin(t * 0.33) * 18) % 360;
            const hueC = (hueA + 154 + Math.cos(t * 0.27) * 22) % 360;

            const root = document.documentElement.style;
            root.setProperty('--hue-a', hueA.toFixed(2));
            root.setProperty('--hue-b', hueB.toFixed(2));
            root.setProperty('--hue-c', hueC.toFixed(2));

            requestAnimationFrame(animateHomeColors);
        }

        requestAnimationFrame(animateHomeColors);

        // Floating Emoji Animation
        const emojis = ["🔥", "💎", "⚡", "🎯", "🌀", "💥", "🌈", "🧊"];

        function createEmoji() {
            const emoji = document.createElement("div");
            emoji.classList.add("emoji");
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.fontSize = (20 + Math.random() * 40) + "px";
            emoji.style.animationDuration = (5 + Math.random() * 10) + "s";
            document.getElementById("emoji-bg").appendChild(emoji);
            setTimeout(() => emoji.remove(), 15000);
        }

        // Create emojis every 500ms
        setInterval(createEmoji, 500);

        // Load player stats
        function loadStats() {
            const profile = JSON.parse(localStorage.getItem('emojiPongProfile') || '{"highScore":0,"games":0,"bestCombo":1}');
            const container = document.getElementById('stats');
            
            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">×${profile.bestCombo || 1}</div>
                    <div class="stat-label">Best Combo</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${profile.highScore || 0}</div>
                    <div class="stat-label">High Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${profile.games || 0}</div>
                    <div class="stat-label">Games Played</div>
                </div>
            `;
        }

        function startGame() {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'game.html';
            }, 180);
        }

        function showInstruction() {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = 'how-to-play.html';
            }, 180);
        }

        // Load stats on page load
        loadStats();
    </script>
</body>
</html>
